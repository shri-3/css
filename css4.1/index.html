<!doctype html>
<html>
  <head>
    <title>CSS</title>
    <link href="styles.css" rel="stylesheet" />
    <style>
      .headingTwo {
        position: relative;
        left: 50px;
      }

      .container {
        width: 300px;
        height: 300px;
        background-color: lightgray;
        position: relative;
      }
      .box {
        width: 150px;
        height: 150px;
        background-color: lightpink;
        position: absolute;
        right: 0px;
        top: 20px;
      }
    </style>
  </head>
  <body>
    <!-- <h1>This heading is at its normal position.</h1> 
<h1 class="heading Two">This heading is shifted from its normal position.</h1> -->
    <h1>Absolute Positioning</h1>
    <div class="container">
      <div class="box">This is a Box</div>
    </div>
  </body>
</html>
