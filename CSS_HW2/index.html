<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Layout Questions</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="page-container">
      <!-- Question 1: Nested Lists -->
      <section class="section">
        <h2 class="divider-title">----------Question 1----------</h2>
        <ul class="nested-list">
          <li>
            Item One
            <ul>
              <li>
                Item Two
                <ul>
                  <li>Item Three</li>
                </ul>
              </li>
            </ul>
          </li>
        </ul>
      </section>

      <!-- Question 2: Staggered Boxes -->
      <section class="section">
        <h2 class="divider-title">----------Question 2----------</h2>
        <div class="staggered-container">
          <div class="gray-square pos-top"></div>
          <div class="gray-square pos-mid"></div>
          <div class="gray-square pos-low"></div>
        </div>
      </section>

      <!-- Question 3: Absolute Position Box -->
      <section class="section">
        <h2 class="divider-title">----------Question 3----------</h2>
        <div class="large-gray-box">
          <div class="pink-label">This is a box.</div>
        </div>
      </section>

      <!-- Question 4: Sidebar Layout -->
      <section class="section">
        <h2 class="divider-title">----------Question 4----------</h2>
        <div class="main-layout-box">
          <aside class="sidebar">
            <div class="menu-box">Menu</div>
          </aside>
          <main class="content-area">This is a content box.</main>
        </div>
      </section>
      <!-- Question 5: Contain Box Layout -->
      <section class="section">
        <h2 class="divider-title">----------Question 5----------</h2>
        <div class="main-contain-box">
          <main class="content-box">Menu 1</main>
          <main class="content-box">Menu 2</main>
          <main class="content-box">Menu 3</main>
        </div>
      </section>
    </div>
  </body>
</html>
