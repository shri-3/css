<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Css3</title>
  </head>
  <body>
    <!-- Block Elements -->
    <div>This is div 1</div>
    <div>This is div 2 <span style="color: red">This is span 1.</span></div>
    <p>This is <strong>para 1</strong></p>
    <h1>This is div 2</h1>
    <footer>This is is footer</footer>
    <!-- Inline Elements -->
    <span>This is span 1.</span>
    <span>This is span 2.</span>
    <a href="/">This is a link.</a>
    <!-- Inline-Block Elements -->
    <div style="display: inline-block; height: 200px">
      This is displaying inline-block effect
    </div>
    <p style="display: inline-block; height: 200px; border: 1px solid green">
      This is paragraph two.
    </p>
  </body>
</html>
