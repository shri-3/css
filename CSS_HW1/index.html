<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Blog Home Page</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="container">
      <!-- Main Blog Header Banner -->
      <header class="blog-banner">
        <h1>BLOG TITLE</h1>
      </header>

      <!-- Navigation Bar Links -->
      <nav class="navigation-bar">
        <a href="#">Home</a>
        <a href="#">Categories</a>
        <a href="#">About</a>
      </nav>

      <!-- Main Active Blog Post Title Section -->
      <section class="content-box post-title-box">
        <h2>Blog Post Title</h2>
      </section>

      <!-- Active Blog Post Preview Content -->
      <section class="content-box post-preview-box">
        <p>Blog Post Content Preview</p>
      </section>

      <!-- Sidebar / Secondary Recent Posts List -->
      <section class="content-box posts-list-box">
        <div class="list-item">Post 1</div>
        <div class="list-item">Post 2</div>
        <div class="list-item">Post 3</div>
      </section>
      <nav class="navigation-bar">
        <a href="#">Contact</a>
        <a href="#">privacy Policy</a>
      </nav>
    </div>
  </body>
</html>
